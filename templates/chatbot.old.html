{% extends "layouts/base.html" %}

{% block title %}
AI Farming Assistant | AgriNova AI
{% endblock %}

{% block content %}

<div class="container-fluid">

    <!-- ========================================= -->
    <!-- Chat Header -->
    <!-- ========================================= -->

    <div class="row mb-4">

        <div class="col-lg-12">

            <div class="card border-0 shadow-sm">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h2 class="fw-bold mb-1">

                                AI Farming Assistant

                            </h2>

                            <p class="text-muted mb-0">

                                Powered by AgriNova AI

                            </p>

                        </div>

                        <span class="badge bg-success p-2">

                            ● Online

                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <div class="row">

        <!-- ========================================= -->
        <!-- Suggestions -->
        <!-- ========================================= -->

        <div class="col-lg-3">

            <div class="card shadow-sm border-0">

                <div class="card-header">

                    Quick Questions

                </div>

                <div class="card-body d-grid gap-2">

                    <button class="btn btn-outline-success chat-suggestion">

                        Recommend crop

                    </button>

                    <button class="btn btn-outline-success chat-suggestion">

                        Tomato Early Blight

                    </button>

                    <button class="btn btn-outline-success chat-suggestion">

                        Fertilizer recommendation

                    </button>

                    <button class="btn btn-outline-success chat-suggestion">

                        Irrigation advice

                    </button>

                    <button class="btn btn-outline-success chat-suggestion">

                        Weather guidance

                    </button>

                    <button class="btn btn-outline-success chat-suggestion">

                        Soil health tips

                    </button>

                </div>

            </div>

        </div>


        <!-- ========================================= -->
        <!-- Chat Window -->
        <!-- ========================================= -->

        <div class="col-lg-9">

            <div class="card shadow-sm border-0">

                <div class="card-header">

                    Conversation

                </div>

                <div

                    id="chatBody"

                    class="card-body"

                    style="height:500px;overflow-y:auto;background:#f8f9fa;">

                </div>

                <div class="card-footer">

                    <div class="input-group">

                        <input

                            type="text"

                            id="chatInput"

                            class="form-control"

                            placeholder="Ask anything about farming..."

                        >

                        <button

                            class="btn btn-success"

                            id="sendMessage">

                            <i class="fas fa-paper-plane"></i>

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

{% endblock %}
