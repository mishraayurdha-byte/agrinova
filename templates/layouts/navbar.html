<script>

function updateClock() {

    const clock = document.getElementById("liveClock");

    if (!clock)
        return;

    const now = new Date();

    clock.innerHTML =
        now.toLocaleDateString() +
        " " +
        now.toLocaleTimeString();

}

setInterval(updateClock, 1000);

updateClock();

</script>
