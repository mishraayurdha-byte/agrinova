<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">


    <title>
        {% block title %}
        AgriNova AI
        {% endblock %}
    </title>


    <!-- Bootstrap 5 CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">


    <!-- Bootstrap Icons -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">


    <!-- AgriNova Custom CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static',
        filename='css/style.css') }}">


    {% block extra_css %}
    {% endblock %}


</head>


<body>


<!-- Loader -->

{% include "loader.html" %}



<!-- Navbar -->

{% include "navbar.html" %}




<div class="container-fluid">


    <div class="row">


        <!-- Sidebar -->

        <aside class="col-md-3 col-lg-2">

            {% include "sidebar.html" %}

        </aside>




        <!-- Main Content -->

        <main class="col-md-9 col-lg-10">


            <div class="p-4">


                <!-- Toast -->

                {% include "toast.html" %}



                {% block content %}

                {% endblock %}



            </div>


        </main>



    </div>


</div>





<!-- Footer -->

{% include "footer.html" %}





<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>




<!-- Chart.js -->

<script
src="https://cdn.jsdelivr.net/npm/chart.js">
</script>




<!-- AgriNova JS -->

<script
src="{{ url_for('static',
filename='js/main.js') }}">
</script>



{% block extra_js %}
{% endblock %}



</body>

</html>
