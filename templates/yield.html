{% extends "base.html" %}

{% block title %}Yield Prediction | AgriNova AI{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-12">

            <h2 class="fw-bold text-success">

                <i class="bi bi-graph-up-arrow"></i>

                Crop Yield Prediction

            </h2>

            <p class="text-muted">

                Predict crop yield using weather and soil nutrient information.

            </p>

        </div>

    </div>

    <div class="card shadow border-0">

        <div class="card-body">

            <form id="yieldForm">

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Crop Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="crop"
                            placeholder="Rice"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Rainfall (mm)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="rainfall"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Temperature (°C)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="temperature"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Humidity (%)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="humidity"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Nitrogen (N)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="nitrogen"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Phosphorus (P)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="phosphorus"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Potassium (K)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="potassium"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    <i class="bi bi-lightning-charge-fill"></i>

                    Predict Yield

                </button>

            </form>

        </div>

    </div>

    <div
        class="card shadow mt-4 d-none"
        id="resultCard">

        <div class="card-body">

            <h4 class="text-success">

                Prediction Result

            </h4>

            <hr>

            <h2 id="prediction"></h2>

            <div
                class="alert alert-success mt-3"
                id="remarks">

            </div>

        </div>

    </div>

</div>

<script>

document.getElementById("yieldForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        crop: document.getElementById("crop").value,

        rainfall: parseFloat(document.getElementById("rainfall").value),

        temperature: parseFloat(document.getElementById("temperature").value),

        humidity: parseFloat(document.getElementById("humidity").value),

        nitrogen: parseFloat(document.getElementById("nitrogen").value),

        phosphorus: parseFloat(document.getElementById("phosphorus").value),

        potassium: parseFloat(document.getElementById("potassium").value)

    };

    try{

        const response = await fetch("/api/yield",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify(data)

        });

        const result = await response.json();

        if(result.success){

            document.getElementById("resultCard").classList.remove("d-none");

            document.getElementById("prediction").innerHTML =
                result.prediction;

            document.getElementById("remarks").innerHTML =
                "AI prediction completed successfully.";

        }else{

            alert(result.message);

        }

    }catch(error){

        alert("Unable to connect to the server.");

    }

});

</script>

{% endblock %}
