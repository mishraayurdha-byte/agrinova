version: "3.9"

services:

  agrinova:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: agrinova_ai

    restart: unless-stopped

    expose:
      - "8000"

    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"

    volumes:
      - ./database:/app/database
      - ./reports:/app/reports
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./models:/app/models

    networks:
      - agrinova_network

  nginx:

    image: nginx:stable-alpine

    container_name: agrinova_nginx

    restart: unless-stopped

    depends_on:
      - agrinova

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - ./uploads:/app/uploads:ro
      - ./reports:/app/reports:ro

    networks:
      - agrinova_network

networks:

  agrinova_network:
    driver: bridge